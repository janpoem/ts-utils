name: Version bump, tag and publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun.js
        uses: oven-sh/setup-bun@v2

      - name: Get current version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bumped-version
        run: |
          CURRENT="${{ steps.version.outputs.current }}"
          TYPE="${{ inputs.version_type }}"

          IFS='.' read -r major minor patch <<< "$CURRENT"

          case $TYPE in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.bumped-version.outputs.version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Verify version updated
        run: |
          ACTUAL=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.bumped-version.outputs.version }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! package.json has $ACTUAL but expected $EXPECTED"
            exit 1
          fi
          echo "Version verified: $ACTUAL"

      - name: Commit and tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bumped-version.outputs.version }}"
          git tag ${{ steps.bumped-version.outputs.tag }}
          git push
          git push --tags

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint check
        run: bun run lint

      - name: TypeScript check
        run: bun run ts-check

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Verify version before publish
        run: |
          ACTUAL=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.bumped-version.outputs.version }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch before publish! $ACTUAL != $EXPECTED"
            exit 1
          fi
          echo "Publishing version $ACTUAL"

      - name: Publish package to NPM
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
